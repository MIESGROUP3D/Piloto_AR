<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prueba de cámara</title>
  <style>
    body { margin:0; font-family:system-ui,sans-serif; background:#111; color:#fff; text-align:center; }
    video { width:100%; max-height:70vh; background:#000; display:block; }
    button { margin:16px; padding:14px 28px; font-size:1rem; border:0; border-radius:999px; background:#fff; color:#111; font-weight:700; }
    #log { padding:14px; font-size:.85rem; white-space:pre-wrap; text-align:left; }
    .ok{color:#4ade80} .err{color:#ff6b6b}
  </style>
</head>
<body>
  <button id="btn">Abrir cámara</button>
  <video id="v" autoplay playsinline muted></video>
  <div id="log"></div>
  <script>
    const log = document.getElementById('log');
    function add(msg, cls){ const d=document.createElement('div'); if(cls)d.className=cls; d.textContent=msg; log.appendChild(d); }

    add('Protocolo: ' + location.protocol + ' (debe ser https:)', location.protocol==='https:'?'ok':'err');
    add('mediaDevices disponible: ' + !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia), (navigator.mediaDevices&&navigator.mediaDevices.getUserMedia)?'ok':'err');
    add('Navegador: ' + navigator.userAgent);

    document.getElementById('btn').addEventListener('click', async () => {
      add('Pidiendo permiso de cámara…');
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
        document.getElementById('v').srcObject = stream;
        const track = stream.getVideoTracks()[0];
        add('✅ CÁMARA OK -> ' + (track ? track.label : 'sin etiqueta'), 'ok');
      } catch (e) {
        add('❌ ERROR: ' + e.name + ' — ' + e.message, 'err');
        if (e.name === 'NotAllowedError') add('=> Permiso denegado. Activa la cámara en el candado 🔒 de la barra y recarga.', 'err');
        if (e.name === 'NotFoundError') add('=> No se encontró cámara.', 'err');
        if (e.name === 'NotReadableError') add('=> La cámara está en uso por otra app. Ciérrala.', 'err');
      }
    });
  </script>
</body>
</html>
