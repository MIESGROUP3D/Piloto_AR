<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Experiencia AR</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; font-family:system-ui,sans-serif; background:#000; }

    /* Aviso breve mientras se concede el permiso; desaparece al haber imagen */
    #overlay {
      position:fixed; inset:0; z-index:30; display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:18px; text-align:center;
      color:#fff; padding:32px; background:radial-gradient(circle at 50% 30%, #1c2530, #05080c);
      transition:opacity .4s;
    }
    #overlay img { width:120px; border-radius:10px; box-shadow:0 8px 30px rgba(0,0,0,.5); }
    #overlay p { font-size:.95rem; opacity:.85; max-width:300px; line-height:1.5; }

    #status {
      position:fixed; left:8px; right:8px; bottom:8px; z-index:25; text-align:center;
      font-size:.8rem; color:#fff; background:rgba(0,0,0,.5); padding:8px 12px;
      border-radius:8px; backdrop-filter:blur(6px); display:none;
    }
  </style>
</head>
<body>
  <!-- autoStart: true => el permiso de cámara aparece solo al abrir; al aceptar, escanea -->
  <a-scene
    mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: no; uiScanning: no; uiError: no;"
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">
    <a-assets>
      <img id="card" src="./revelacion.jpg" crossorigin="anonymous" />
    </a-assets>
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
    <a-entity id="target" mindar-image-target="targetIndex: 0">
      <a-plane id="reveal" src="#card" position="0 0 0" rotation="0 0 0" width="1" height="0.664"></a-plane>
    </a-entity>
  </a-scene>

  <div id="overlay">
    <img src="./revelacion.jpg" alt="vista previa" />
    <p>Permite la cámara cuando te lo pida.<br>Luego apunta al boceto.</p>
  </div>
  <div id="status"></div>

  <script>
    const overlay = document.getElementById('overlay');
    const statusEl = document.getElementById('status');
    const target = document.getElementById('target');
    let found = false, hidActivated = false;

    function setStatus(msg){ statusEl.style.display='block'; statusEl.textContent = msg; }
    function hideOverlay(){ if(hidActivated) return; hidActivated=true; overlay.style.opacity='0'; setTimeout(()=>overlay.style.display='none',400); }

    // Arreglo iOS (muted property + play) + indicador en pantalla
    setInterval(() => {
      const vid = document.querySelector('video');
      if (!vid) { setStatus('⏳ iniciando cámara…'); return; }
      vid.muted = true; vid.defaultMuted = true;
      vid.setAttribute('playsinline',''); vid.setAttribute('webkit-playsinline','');
      if (vid.paused) vid.play().catch(()=>{});
      if (vid.videoWidth === 0) {
        setStatus('⏳ cámara activa, esperando imagen (0×0)…');
      } else {
        hideOverlay();
        setStatus(found
          ? '✅ ¡boceto detectado! · vídeo ' + vid.videoWidth + '×' + vid.videoHeight
          : '🔍 buscando el boceto… · vídeo ' + vid.videoWidth + '×' + vid.videoHeight);
      }
    }, 600);

    target.addEventListener('targetFound', () => { found = true; });
    target.addEventListener('targetLost',  () => { found = false; });
    window.addEventListener('error', e => setStatus('❌ ' + e.message));
  </script>
</body>
</html>
