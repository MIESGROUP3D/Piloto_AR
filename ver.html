<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Ver cámara</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; background:#000; font-family:system-ui,sans-serif; }
    #v { position:fixed; inset:0; width:100%; height:100%; object-fit:cover; background:#000; }
    #tap {
      position:fixed; inset:0; z-index:10; display:flex; align-items:center; justify-content:center;
      background:#05080c; color:#fff; font-size:1.4rem; font-weight:700; text-align:center; padding:30px;
    }
    #verdict {
      position:fixed; left:0; right:0; bottom:0; z-index:20; padding:16px;
      font-size:1.1rem; font-weight:700; text-align:center; color:#fff;
    }
    .ok { background:rgba(10,125,44,.92); }
    .bad { background:rgba(176,0,32,.92); }
  </style>
</head>
<body>
  <video id="v" autoplay playsinline muted webkit-playsinline></video>
  <div id="tap">👆 Toca para abrir la cámara</div>
  <div id="verdict"></div>

  <script>
    const v = document.getElementById('v');
    const tap = document.getElementById('tap');
    const verdict = document.getElementById('verdict');
    function say(msg, ok){ verdict.textContent = msg; verdict.className = ok ? 'ok' : 'bad'; }

    async function go() {
      tap.textContent = 'Abriendo cámara…';
      // Forzar mute por PROPIEDAD (iOS no respeta el atributo)
      v.muted = true; v.defaultMuted = true;
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
        v.srcObject = stream;
        await v.play().catch(()=>{});
        tap.style.display = 'none';
        // Comprobar fotogramas cada 700ms
        let n = 0;
        const t = setInterval(() => {
          n++;
          if (v.videoWidth > 0) {
            say('✅ HAY IMAGEN — ' + v.videoWidth + '×' + v.videoHeight + ' (si lo ves negro arriba, es de pintado)', true);
            clearInterval(t);
          } else {
            say('⏳ esperando fotogramas… (readyState ' + v.readyState + ')', false);
            if (n > 8) { say('❌ SIN FOTOGRAMAS (0×0). iOS da permiso pero no envía imagen: revisa Modo bajo consumo / bloqueador.', false); clearInterval(t); }
          }
        }, 700);
      } catch (e) {
        tap.style.display = 'none';
        say('❌ ' + e.name + ': ' + e.message, false);
      }
    }
    tap.addEventListener('click', go);
  </script>
</body>
</html>
